  fill="none" stroke="#185FA5" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr)"/>

<!-- CAP/SIR (R-D) → Firestore  amber dashed
     Exit: right edge x=790, mid y=757
     → x=802 (offset from blue), down to y=914, left to x=410 -->
<path d="M790,757 L802,757 L802,914 L411,914 L411,702"
  fill="none" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr)"/>

