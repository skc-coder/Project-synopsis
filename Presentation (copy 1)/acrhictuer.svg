<!-- ══════════════════════════════════════════
     DASHED CONNECTORS
     Strategy: route every dashed line through
     the OUTER margins (x≤10 or x≥810) so they
     never pass through any box.

     Firestore entry point: bottom centre (410, 702)
     We funnel all 4 lines into a single entry
     via a horizontal bus at y=930 — fully below
     all boxes (bottom of row-E = 878).

     Left-side lines exit boxes on the LEFT edge,
     travel left to x=10, go down, then right to
     the bus.
     Right-side lines exit boxes on the RIGHT edge,
     travel right to x=810, go down, then left.
     Both sides meet the bus at y=930 and converge
     to x=410, then up to Firestore bottom (702).
══════════════════════════════════════════ -->

<!-- Post-video quiz (L-D) → Firestore  amber dashed
     Exit: left edge of L-D box = x=30, mid y=757
     → x=10, down to y=930, right to x=410, up to y=702 -->
<path d="M30,757 L10,757 L10,930 L410,930 L410,702"
  fill="none" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr)"/>

<!-- Parent dashboard (L-E) → Firestore  green dashed
     Exit: left edge x=30, mid y=845
     → x=10 (slightly inside the amber line), but same x=10
     We offset to x=16 to keep them visually distinct -->
<path d="M30,845 L16,845 L16,938 L410,938 L410,702"
  fill="none" stroke="#3B6D11" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr)"/>

<!-- Quiz score review (R-C) → Firestore  blue dashed
     Exit: right edge x=790, mid y=669
     → x=810, down to y=922, left to x=410, up to y=702 -->
